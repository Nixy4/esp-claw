version: 1.0.0

devices:
  - name: power_ctrl
    chip: none
    type: custom
    version: default
    dependencies:
      llgok/lilygo_device_driver:
        version: "^2.1.0"
    peripherals:
      - name: i2c_port0

  - name: display_lcd
    chip: none
    type: custom
    version: default

  - name: lcd_brightness
    chip: none
    type: custom
    version: default

  - name: audio_dac
    chip: es8311
    type: audio_codec
    version: default
    config:
      dac_enabled: true
      dac_max_channel: 1
      dac_channel_mask: "1"
      mclk_enabled: true
    peripherals:
      - name: i2s_audio_out
      - &es8311_i2c
        name: i2c_port1
        address: 0x30
        frequency: 400000

  - name: audio_adc
    chip: es8311
    type: audio_codec
    version: default
    config:
      adc_enabled: true
      adc_max_channel: 2
      adc_channel_mask: "11"
      adc_channel_labels: [RE, FC]
      mclk_enabled: true
    peripherals:
      - name: i2s_audio_in
      - *es8311_i2c